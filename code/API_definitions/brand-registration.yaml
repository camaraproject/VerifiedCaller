openapi: 3.0.3
info:
  title: Brand Registration
  description: |
    This API provides the ability to associate a calling party number with a human-readable string that is displayed to the callee on their device screen instead of the calling number.

    # Introduction

    Consumers of this API can associate calling party numbers with a human-readable string that is to be displayed to the callee on their device screen instead of the calling number. This allows the callee to recognize the caller even if the calling party number is not registered in the callee's device and increases the likelihood of the call being answered.

    Brand Registration API could be useful in scenarios such as:
    - Telesales
    - Customer Support
    - Outreach efforts of NGOs.
    - Calls placed by authorities or government institutions for official matters.

    # Relevant terms and definitions
    * **phoneNumber** and **phoneNumberAlternate**: A pair of E.164 numbers representing the caller. Depending on the caller's networks access setup , only phoneNumber or both phoneNumber & phoneNumberAlternate may be used to uniquely identify the caller. The values typically correspond to parameters used in telecom signalling protocols, e.g. PAI and FROM headers in SIP.
    * **status**: Status of the registration.
    * **displayName**: A human-readable string that is to be displayed to the callee on their device screen instead of the calling number.
    * **displayAsset**: A visual asset (e.g. a logo, image or video) that is to be displayed to the callee on their device screen instead of the calling number. Support of the visual asset depends on the service provider and callee's device. If the service provider does not support the parameter, it SHALL clearly document the limitation and SHOULD silently ignore the parameter if received.
    * **customerId** : A string to represent the owner of the displayName, e.g. a commercial brand or an institution.
    * **verifyCallerAction**: An instruction applied during actual call setup. Indicates the action to be taken by the service provider if the authenticity of the caller cannot be established using VerifiedCaller API capabilities.
    * **Notification URL and token**:  The API consumer may provide a callback URL (`sink`) on which notifications about events related to given brand registration(eg. calls with brand information) can be received from the API provider. This is an optional parameter. The notification will be sent as a CloudEvent compliant message.
    If `sink` is included, it is RECOMMENDED for the client to provide as well the `sinkCredential` property to protect the notification endpoint. In the current version, `sinkCredential.credentialType` MUST be set to `ACCESSTOKEN` if `sinkCredential` is provided or to `PRIVATE_KEY_JWT` if authentication information is pre-shared.

    # API Functionality

    The API exposes the following endpoints/operations:

    - `/registrations` :
      - **POST** operation creates a new registration and returns a registration identifier
      - **GET** operation reads existing registrations from the brand registration service
    - `/registrations/{registrationId}` :
      - **PUT** operation updates an existing registration identified by the registrationId in the brand registration service
      - **GET** operation reads an existing registration identified by the registrationId from the brand registration service
      - **DEL** operation deletes an existing registration identified by the registrationId from the brand registration service

    # Authorization and authentication

    The "Camara Security and Interoperability Profile" provides details of how an API consumer requests an access token. Please refer to Identity and Consent Management (https://github.com/camaraproject/IdentityAndConsentManagement/) for the released version of the profile.

    The specific authorization flows to be used will be agreed upon during the onboarding process, happening between the API consumer and the API provider, taking into account the declared purpose for accessing the API, whilst also being subject to the prevailing legal framework dictated by local legislation.

    In cases where personal data is processed by the API and users can exercise their rights through mechanisms such as opt-in and/or opt-out, the use of three-legged access tokens is mandatory. This ensures that the API remains in compliance with privacy regulations, upholding the principles of transparency and user-centric privacy-by-design.

    # Additional CAMARA error responses

    The list of error codes in this API specification is not exhaustive. Therefore the API specification may not document some non-mandatory error statuses as indicated in `CAMARA API Design Guide`.

    Please refer to the `CAMARA_common.yaml` of the Commonalities Release associated to this API version for a complete list of error responses. The applicable Commonalities Release can be identified in the `API Readiness Checklist` document associated to this API version.

    As a specific rule, error `501 - NOT_IMPLEMENTED` can be only a possible error response if it is explicitly documented in the API.

    # Further info and support

    (FAQs will be added in a later version of the documentation)
  version: wip

  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-camara-commonalities: 0.7.0
externalDocs:
  description: Project documentation at Camara
  url: https://github.com/camaraproject/VerifiedCaller
servers:
  - url: '{apiRoot}/brand-registration/vwip'
    variables:
      apiRoot:
        default: http://localhost:9091
        description: API root
tags:
  - name: Create Brand registration
    description: Create Brand Registration Information for a Calling Party
  - name: Update Brand registration
    description: Update Existing Brand Registration Information for a Calling Party
  - name: Read Brand registration
    description: Read Existing Brand Registration Information for a Calling Party
  - name: Delete Brand registration
    description: Delete Existing Brand Registration Information for a Calling Party
  - name: Call branded notifications callback
    description: Notifications callback invoked by the API provider when a call is successfully branded for a registration that opted in with `sink`.
paths:
  /registrations:
    post:
      tags:
        - Create Brand registration
      summary: Register new brand information in the service platform
      description: Register new brand information with optional call verification request.
      operationId: createRegistration
      parameters:
        - $ref: '#/components/parameters/x-correlator'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrUpdateRegistrationRequest'
            examples:
              INPUT_SINGLE_PHONE_NUMBER:
                summary: Device identified by phoneNumber
                description: Create a registration for a device, identified by a phone number
                value:
                  phoneNumber: "+123456789"
                  terminatingCountryCode: 44
                  displayName: "Company X Calling"
                  customerId: "Customer1"
                  verifyCallerAction: "DO_NOT_BRAND"
              INPUT_TWO_PHONE_NUMBERS:
                summary: Device identified by phoneNumber & phoneNumberAlternate
                description: Create a registration for a device, identified by a phone number & phone number alternate
                value:
                  phoneNumber: "+123456789"
                  phoneNumberAlternate: "+123456790"
                  terminatingCountryCode: 44
                  displayName: "Company Y Calling"
                  displayAsset: "https://ims.operator-name.com/brand-logo.bmp;purpose=icon"
                  customerId: "Customer2"
                  verifyCallerAction: "DO_NOT_BRAND"
              INPUT_WITH_NOTIFICATIONS_ACCESSTOKEN:
                summary: Registration with notifications (ACCESSTOKEN credential)
                description: |
                  Create a registration and opt in for CloudEvent notifications.
                  The API provider will call the `sink` URL with a bearer token when a call is branded.
                value:
                  phoneNumber: "+123456789"
                  terminatingCountryCode: 44
                  displayName: "Company X Calling"
                  customerId: "Customer1"
                  verifyCallerAction: "DO_NOT_BRAND"
                  sink: "https://endpoint.example.com/sink"
                  sinkCredential:
                    credentialType: "ACCESSTOKEN"
                    accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    accessTokenExpiresUtc: "2026-07-03T12:27:08.312Z"
                    accessTokenType: "bearer"
              INPUT_WITH_NOTIFICATIONS_PRIVATE_KEY_JWT:
                summary: Registration with notifications (PRIVATE_KEY_JWT credential)
                description: |
                  Create a registration and opt in for CloudEvent notifications using PRIVATE_KEY_JWT.
                  Authorization server details (token endpoint, client ID, JWKS URL) are shared out-of-band
                  between the consumer and the API provider during onboarding.
                value:
                  phoneNumber: "+123456789"
                  terminatingCountryCode: 44
                  displayName: "Company X Calling"
                  customerId: "Customer1"
                  verifyCallerAction: "DO_NOT_BRAND"
                  sink: "https://endpoint.example.com/sink"
                  sinkCredential:
                    credentialType: "PRIVATE_KEY_JWT"

      callbacks:
        notifications:
          "{$request.body#/sink}":
            post:
              tags:
                - Call branded notifications callback
              summary: Call branded notifications callback
              description: |
                Important: this endpoint is to be implemented by the API consumer.
                The API provider will call this endpoint whenever a call associated with
                a brand registration that opted in with `sink` is successfully branded.
              operationId: postCallBrandedNotification
              parameters:
                - $ref: '#/components/parameters/x-correlator'
              requestBody:
                required: true
                content:
                  application/cloudevents+json:
                    schema:
                      $ref: '#/components/schemas/BrandRegistrationNotificationEvent'
                    examples:
                      CALL_BRANDED_EVENT:
                        $ref: '#/components/examples/CALL_BRANDED_EVENT'
              responses:
                '204':
                  description: Successful notification
                  headers:
                    x-correlator:
                      $ref: '#/components/headers/x-correlator'
                '400':
                  $ref: '#/components/responses/Generic400'
                '401':
                  $ref: '#/components/responses/Generic401'
                '403':
                  $ref: '#/components/responses/Generic403'
                '410':
                  $ref: '#/components/responses/Generic410'
                '429':
                  $ref: '#/components/responses/Generic429'
              security:
                - {}
                - notificationsBearerAuth: []

      responses:
        '201':
          $ref: '#/components/responses/SuccessfulRecord'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Create404'
        '409':
          $ref: '#/components/responses/Generic409'
        '422':
          $ref: '#/components/responses/CreateOrUpdateRegistrationUnprocessableEntity422'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
        '503':
          $ref: '#/components/responses/Generic503'

      security:
        - openId:
            - brand-registration:create
    get:
      tags:
        - Read Brand registration
      summary: Read existing brand registrations from the service platform
      description: Read existing brand registrations from the service platform.
      operationId: readRegistrations
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Seek'
      responses:
        '200':
          $ref: '#/components/responses/SuccessfulRecords'
        '204':
          $ref: '#/components/responses/204NoContent'
        '206':
          $ref: '#/components/responses/SuccessfulPartialRecords'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
        '503':
          $ref: '#/components/responses/Generic503'

      security:
        - openId:
            - brand-registration:read

  /registrations/{registrationId}:
    get:
      tags:
        - Read Brand registration
      summary: Read an existing brand registration from the service platform
      description: Read an existing brand registration from the service platform
      operationId: readRegistration
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - description: Unique identifier of an existing brand registration
          in: path
          name: registrationId
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessfulRecord'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
        '503':
          $ref: '#/components/responses/Generic503'

      security:
        - openId:
            - brand-registration:read
    delete:
      tags:
        - Delete Brand registration
      summary: Delete an existing brand registration from the service platform
      description: Delete an existing brand registration from the service platform
      operationId: deleteRegistration
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - description: Unique identifier of an existing brand registration
          in: path
          name: registrationId
          required: true
          schema:
            type: string
      responses:
        '204':
          $ref: '#/components/responses/204NoContent'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Generic404'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
        '503':
          $ref: '#/components/responses/Generic503'

      security:
        - openId:
            - brand-registration:delete
    put:
      tags:
        - Update Brand registration
      summary: Update an existing brand registration in the service platform
      description: Update an existing brand registration
      operationId: updateRegistration
      parameters:
        - $ref: '#/components/parameters/x-correlator'
        - description: Unique identifier of an existing brand registration
          in: path
          name: registrationId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrUpdateRegistrationRequest'
            examples:
              INPUT_SINGLE_PHONE_NUMBER:
                summary: Device identified by phoneNumber
                description: Update registration for a device, identified by a phone number
                value:
                  phoneNumber: "+123456789"
                  terminatingCountryCode: 44
                  displayName: "Company X Calling"
                  customerId: "Customer1"
                  verifyCallerAction: "DO_NOT_BRAND"
              INPUT_TWO_PHONE_NUMBERS:
                summary: Device identified by phoneNumber & phoneNumberAlternate
                description: Update registration for a device, identified by a phone number & phone number alternate
                value:
                  phoneNumber: "+123456789"
                  phoneNumberAlternate: "+123456790"
                  terminatingCountryCode: 44
                  displayName: "Company Y Calling"
                  displayAsset: "https://ims.operator-name.com/brand-logo.bmp;purpose=icon"
                  customerId: "Customer2"
                  verifyCallerAction: "DO_NOT_BRAND"

      responses:
        '200':
          $ref: '#/components/responses/SuccessfulRecord'
        '400':
          $ref: '#/components/responses/Generic400'
        '401':
          $ref: '#/components/responses/Generic401'
        '403':
          $ref: '#/components/responses/Generic403'
        '404':
          $ref: '#/components/responses/Update404'
        '409':
          $ref: '#/components/responses/Generic409'
        '422':
          $ref: '#/components/responses/CreateOrUpdateRegistrationUnprocessableEntity422'
        '429':
          $ref: '#/components/responses/Generic429'
        '500':
          $ref: '#/components/responses/Generic500'
        '503':
          $ref: '#/components/responses/Generic503'

      security:
        - openId:
            - brand-registration:update

components:
  securitySchemes:
    openId:
      description: OpenID Connect authentication
      type: openIdConnect
      openIdConnectUrl: https://example.com/.well-known/openid-configuration
    notificationsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "{$request.body#/sinkCredential.credentialType}"
      description: |
        Bearer token for notification delivery. Token format is determined
        by `sinkCredential.credentialType` in the subscription request.
  parameters:
    x-correlator:
      name: x-correlator
      in: header
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
    Page:
      name: page
      in: query
      description: |
        Indicates the subset of entries to be returned, where total number of pages is determined by the number of all applicable entries and the value of the *perPage* parameter.
        *First page is indicated with value 0.*
      schema:
        type: integer
        default: 0
    PerPage:
      name: perPage
      in: query
      description: Indicates the number of entries to be returned in each response. Has no effect if total number of applicable entries < perPage.
      schema:
        type: integer
        default: 10
    Seek:
      name: seek
      in: query
      description: Indicates the last entry read, to create the next/previous subset of entries in the response of the current query.
      schema:
        type: string

  headers:
    x-correlator:
      description: Correlation id for the different services
      schema:
        $ref: "#/components/schemas/XCorrelator"
    Content-Last-Key:
      description: Indicates the index of the last entry provided in the response
      schema:
        type: string
    X-Total-Count:
      description: Total number of applicable entries
      schema:
        type: integer
  schemas:
    XCorrelator:
      type: string
      pattern: ^[a-zA-Z0-9-_:;.\/<>{}]{0,256}$
      example: "b4333c46-49c0-4f62-80d7-f0ef930f1c46"
    PhoneNumber:
      description: A public identifier addressing a telephone subscription. In mobile networks it corresponds to the MSISDN (Mobile Station International Subscriber Directory Number). In order to be globally unique it has to be formatted in international format, according to E.164 standard, prefixed with '+'.
      type: string
      pattern: '^\+[1-9][0-9]{4,14}$'
      example: "+123456789"

    RegistrationId:
      type: string
      format: uuid
      description: Unique identifier of a registration created in the Branded Calling Platform as a result of the POST operation.
      example: "9e765f76-8037-4e5f-ba5d-e0c87c09a320"

    Status:
      type: string
      description: Status of the registration
      enum: [pending, active, inactive]
      example: "pending"

    CustomerId:
      type: string
      description: Unique customer identifier for a brand
      example: "Customer1"

    DisplayName:
      type: string
      maxLength: 32
      description: Brand information that will be displayed for the calling party
      example: "Company X Call Center"

    DisplayAsset:
      type: string
      format: uri
      description: >
        Resource URI for a visual asset (e.g. a logo, image or video) that is to be displayed to the called party.
        The URI MAY be in IMS-style and include semicolon-separated URI parameters in accordance
        with SIP / RFC 3261 conventions (e.g. ';purpose=icon').
        This URI is a logical identifier inside the service provider's network and is not guaranteed to be
        resolvable by general-purpose HTTP clients.
        Support of the DisplayAsset depends on the service provider and called party's device.
      example: "https://ims.operator-name.com/brand-logo.bmp;purpose=icon"

    VerifyCallerAction:
      type: string
      description: >-
        Indicates if Antispoofing feature is enabled for the A-party, if enabled what action to take in case antispoofing check fails. Absence of parameter means feature not enabled.
      example: "DO_NOT_BRAND"
      enum:
        - "BLOCK_UNVERIFIED"
        - "DO_NOT_BRAND"

    TerminatingCountryCode:
      type: integer
      description: Country Code of the called number in E.164 format
      example: 44

    CampaignName:
      type: string
      description: Logical name to group a set of calling party numbers under a brand for a specific purpose, e.g. special charging
      example: "Company X New Year Sales"

    CreateOrUpdateRegistrationRequest:
      type: object
      description: "Request object to create or update (replace) a brand registration"
      required:
        - "phoneNumber"
        - "displayName"
        - "terminatingCountryCode"
      properties:
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        phoneNumberAlternate:
          $ref: '#/components/schemas/PhoneNumber'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        displayAsset:
          $ref: '#/components/schemas/DisplayAsset'
        customerId:
          $ref: '#/components/schemas/CustomerId'
        verifyCallerAction:
          $ref: '#/components/schemas/VerifyCallerAction'
        terminatingCountryCode:
          $ref: '#/components/schemas/TerminatingCountryCode'
        campaignName:
          $ref: '#/components/schemas/CampaignName'
        sink:
          type: string
          format: uri
          maxLength: 2048
          pattern: ^https:\/\/.+$
          description: |
            The HTTPS URL where event notifications for this registration will be delivered.
            Omit this field (and `sinkCredential`) to create the registration without event notifications.
          example: "https://endpoint.example.com/sink"
        sinkCredential:
          $ref: '#/components/schemas/SinkCredential'

    RegistrationRecord:
      type: object
      description: "Object to represent a single brand registration in the service platform"
      required:
        - "registrationId"
        - "phoneNumber"
        - "displayName"
        - "terminatingCountryCode"
      properties:
        registrationId:
          $ref: '#/components/schemas/RegistrationId'
        phoneNumber:
          $ref: '#/components/schemas/PhoneNumber'
        phoneNumberAlternate:
          $ref: '#/components/schemas/PhoneNumber'
        status:
          $ref: '#/components/schemas/Status'
        displayName:
          $ref: '#/components/schemas/DisplayName'
        displayAsset:
          $ref: '#/components/schemas/DisplayAsset'
        customerId:
          $ref: '#/components/schemas/CustomerId'
        verifyCallerAction:
          $ref: '#/components/schemas/VerifyCallerAction'
        terminatingCountryCode:
          $ref: '#/components/schemas/TerminatingCountryCode'
        campaignName:
          $ref: '#/components/schemas/CampaignName'
        sink:
          type: string
          format: uri
          maxLength: 2048
          description: |
            The sink URL registered for event notifications on this registration, if any.
            `sinkCredential` is deliberately not echoed in responses for security reasons.
          example: "https://endpoint.example.com/sink"

    RegistrationRecords:
      type: array
      items:
        $ref: '#/components/schemas/RegistrationRecord'

    ErrorInfo:
      type: object
      required:
        - status
        - code
        - message
      properties:
        status:
          type: integer
          description: HTTP response status code
        code:
          type: string
          description: A human-readable code to describe the error
        message:
          type: string
          description: A human-readable description of what the event represents

    BrandRegistrationEventType:
      type: string
      description: |
        Enum of event type strings emitted by the Brand Registration API.
        Follows the CAMARA reverse-DNS convention `org.camaraproject.<api-name>.<event-version>.<event-name>`.
      enum:
        - org.camaraproject.brand-registration.v0.call-branded

    BrandRegistrationNotificationEvent:
      description: |
        Notification event group for the Brand Registration API.
        Extends the CloudEvent envelope and constrains `type` to the set of event types
        defined by this API. Adding a new event type only requires updating
        `BrandRegistrationEventType` and the discriminator mapping below — the CloudEvent
        base never changes.
      allOf:
        - $ref: '#/components/schemas/CloudEvent'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/BrandRegistrationEventType'
      discriminator:
        propertyName: type
        mapping:
          org.camaraproject.brand-registration.v0.call-branded: '#/components/schemas/EventCallBranded'

    EventCallBranded:
      description: Event emitted when a call associated with a brand registration has been successfully branded.
      allOf:
        - $ref: '#/components/schemas/BrandRegistrationNotificationEvent'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CallBrandedEventData'

    CallBrandedEventData:
      type: object
      description: |
        Event payload describing a successfully branded call.
        The CloudEvent envelope's `time` carries when the call was branded.
      required:
        - registrationId
      properties:
        registrationId:
          $ref: '#/components/schemas/RegistrationId'
        strategy:
          type: string
          enum:
            - SMS
            - BRAND_DISPLAY
          description: Branding strategy applied to the call.
          example: "BRAND_DISPLAY"
        displayNameUsed:
          $ref: '#/components/schemas/DisplayName'
        preAnnouncementId:
          type: string
          format: uuid
          description: |
            Optional. The identifier of the originating pre-announcement, as returned
            in the `AnnouncementInfo` response of `POST /pre-announce` (verified-caller API).
            Present when pre-announcement was used to initiate the branded call.
            Absent when the call was branded automatically without pre-announcement
            (e.g. no `verifyCallerAction` was configured at registration).
          example: "9e765f76-8037-4e5f-ba5d-e0c87c09a320"

    CloudEvent:
      type: object
      description: |
        CloudEvents 1.0 specification envelope.
        Stable base for all event notifications emitted by this API.
      required:
        - id
        - source
        - specversion
        - type
        - time
      properties:
        id:
          type: string
          maxLength: 256
          description: Identifier of this event, unique within the source context.
        source:
          $ref: '#/components/schemas/Source'
        type:
          type: string
          maxLength: 512
          description: |
            Identifies the event type. CAMARA APIs use reverse-DNS notation:
            `org.camaraproject.<api-name>.<event-version>.<event-name>`.
        specversion:
          type: string
          description: Version of the CloudEvents specification the event conforms to.
          enum:
            - "1.0"
        datacontenttype:
          type: string
          description: Media type of the event payload encoding; MUST be `application/json` for CAMARA APIs.
          enum:
            - application/json
        data:
          type: object
          description: Event details payload. Structure is defined by each concrete event schema.
        time:
          type: string
          format: date-time
          description: Timestamp (RFC 3339, UTC) when the event occurred.
          example: "2026-04-22T14:30:00Z"

    Source:
      type: string
      format: uri-reference
      minLength: 1
      maxLength: 2048
      description: |
        Identifies the context in which the event happened. For Brand Registration
        events, this MUST be the URL of the brand-registrations collection of the
        API provider, in the format
        `{apiRoot}/brand-registration/{version}/registrations`.
        The specific `registrationId` the event pertains to is carried in `data.registrationId`.
      example: "https://service-provider.com/brand-registration/v0/registrations"

    SinkCredential:
      type: object
      description: A sink credential provides authentication or authorization information necessary to enable delivery of events to a target.
      properties:
        credentialType:
          type: string
          enum:
            - ACCESSTOKEN
            - PRIVATE_KEY_JWT
          description: The type of the credential - MUST be set to ACCESSTOKEN or PRIVATE_KEY_JWT.
      discriminator:
        propertyName: credentialType
        mapping:
          ACCESSTOKEN: '#/components/schemas/AccessTokenCredential'
          PRIVATE_KEY_JWT: '#/components/schemas/PrivateKeyJWTCredential'
      required:
        - credentialType

    AccessTokenCredential:
      type: object
      description: An access token credential. This type of credential is meant to be used by API Consumers that have limited capabilities to handle authorization requests.
      allOf:
        - $ref: '#/components/schemas/SinkCredential'
        - type: object
          properties:
            accessToken:
              type: string
              maxLength: 4096
              description: REQUIRED. An access token granting access to the target resource.
            accessTokenExpiresUtc:
              type: string
              format: date-time
              maxLength: 64
              description: |
                REQUIRED. An absolute (UTC) timestamp at which the token shall be considered expired.
                It must follow [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) and must have a time zone.
              example: "2026-07-03T12:27:08.312Z"
            accessTokenType:
              type: string
              enum:
                - bearer
              description: REQUIRED. Type of the access token (See [OAuth 2.0](https://tools.ietf.org/html/rfc6749#section-7.1)).
          required:
            - accessToken
            - accessTokenExpiresUtc
            - accessTokenType

    PrivateKeyJWTCredential:
      type: object
      description: |
        Use PRIVATE_KEY_JWT to obtain an access token. The authorization server information needed
        for this type of sink credential (token endpoint, client ID, JWKS URL) is shared upfront
        between the client and the CAMARA entity.
      allOf:
        - $ref: '#/components/schemas/SinkCredential'

